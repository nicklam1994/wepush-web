<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WePush Web - 微信推送管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"
          integrity="sha384-YVPW9X370xBU5teHKK6R8VJ+xAB4JQczEJ2B6GQYhUC0k4nqF0FQjBNiYqR4h5p"
          crossorigin="anonymous">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-wechat"></i><span>WePush Web</span>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link {{ 'active' if page == 'dashboard' else '' }}" href="/">
            <i class="bi bi-speedometer2"></i><span>儀表板</span>
        </a>
        <a class="nav-link {{ 'active' if page == 'settings' else '' }}" href="/settings">
            <i class="bi bi-gear"></i><span>帳號設置</span>
        </a>
        <a class="nav-link {{ 'active' if page == 'templates' else '' }}" href="/templates">
            <i class="bi bi-file-text"></i><span>模板管理</span>
        </a>
        <a class="nav-link {{ 'active' if page == 'recipients' else '' }}" href="/recipients">
            <i class="bi bi-people"></i><span>接收人</span>
        </a>
        <a class="nav-link {{ 'active' if page == 'tasks' else '' }}" href="/tasks">
            <i class="bi bi-clock"></i><span>定時任務</span>
        </a>
        <a class="nav-link {{ 'active' if page == 'push' else '' }}" href="/push">
            <i class="bi bi-send"></i><span>手動推送</span>
        </a>
        <a class="nav-link {{ 'active' if page == 'history' else '' }}" href="/history">
            <i class="bi bi-journal"></i><span>推送歷史</span>
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
// Auto-dismiss alerts after 5 seconds
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.alert-dismissible').forEach(function(el) {
        setTimeout(function() { el.style.display = 'none'; }, 5000);
    });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
